schemaVersion: 1
name: "srvcs-nthroot"
slug: "nthroot"
repository: "srvcs/nthroot"
package: "srvcs-nthroot"
function: "arithmetic: nth root of value (alias of root)"
kind: "orchestrator"
categories:
  - "arithmetic"
dependencies:
  - slug: "root"
    service: "srvcs-root"
endpoints:
  - method: "GET"
    path: "/"
    purpose: "Service identity"
  - method: "POST"
    path: "/"
    purpose: "Evaluate the service function"
  - method: "GET"
    path: "/healthz"
    purpose: "Liveness probe"
  - method: "GET"
    path: "/readyz"
    purpose: "Readiness probe"
  - method: "GET"
    path: "/metrics"
    purpose: "Prometheus metrics"
  - method: "GET"
    path: "/openapi.json"
    purpose: "OpenAPI document"
inputs:
  - name: "value"
    type: "json"
    required: true
  - name: "n"
    type: "json"
    required: true
outputs:
  - name: "value"
    type: "json"
  - name: "n"
    type: "json"
  - name: "result"
    type: "number"
configuration:
  - name: "SRVCS_BIND_ADDR"
    default: "0.0.0.0:8080"
    purpose: "Bind address"
  - name: "SRVCS_ENV"
    default: "development"
    purpose: "Environment label for logs"
  - name: "RUST_LOG"
    default: "info,tower_http=info"
    purpose: "Tracing filter"
  - name: "SRVCS_ROOT_URL"
    default: "http://127.0.0.1:8120"
    purpose: "Base URL for srvcs-root"
